name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest --junitxml=evidence/junit.xml

      - name: Generate test evidence
        run: python scripts/generate_evidence.py

      - name: Generate traceability matrix
        run: python scripts/generate_traceability_matrix.py

      - name: Evaluate release gate
        run: python scripts/evaluate_release_gate.py

      - name: Generate human-readable evidence summary
        run: python scripts/generate_evidence_summary.py

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evidence
          path: |
            evidence/*.json
            evidence/*.md
            evidence/junit.xml
